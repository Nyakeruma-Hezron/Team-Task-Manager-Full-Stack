services:
  # 1. The Master Proxy
  proxy:
    image: ghcr.io/nyakeruma-hezron/team-task-manager-full-stack-proxy:latest
    ports:
      - "8082:80"
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  # 2. The Frontend UI
  frontend:
    image: ghcr.io/nyakeruma-hezron/team-task-manager-full-stack-frontend:latest
    restart: unless-stopped

  # 3. The Backend API
  backend:
    image: ghcr.io/nyakeruma-hezron/team-task-manager-full-stack-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db

  # 4. The Redis Cache
  redis:
    image: ghcr.io/nyakeruma-hezron/team-task-manager-full-stack-redis:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # 5. The PostgreSQL Database (Unchanged)
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: supersecretpassword 
      POSTGRES_DB: taskmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: