version: '3.8'

services:
  # 1. The Front Door (Only container exposed to the internet)
  proxy:
    build: ./nginx
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  # 2. The Frontend UI (Completely hidden from the internet)
  frontend:
    build: ./frontend
    restart: unless-stopped
    # No ports mapped! The proxy talks to it internally on port 80.

  # 3. The Backend API (Completely hidden)
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    # No ports mapped! The proxy talks to it internally on port 3000.

  # 4. The Custom Redis Cache (Completely hidden)
  redis:
    build: ./redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # No ports mapped! Only the backend can talk to it internally.

volumes:
  redis_data:
  # sqlite_data: (Keep this if you are still using SQLite!)