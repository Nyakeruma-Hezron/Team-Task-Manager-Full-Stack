services:
  # 1. The Master Proxy (The Front Door)
  proxy:
    build: ./nginx
    ports:
      - "8082:80"
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

  # 2. The Frontend UI (Hidden)
  frontend:
    build: ./frontend
    restart: unless-stopped
    # No ports exposed!

  # 3. The Backend API (Hidden)
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - db
    # No ports exposed!

  # 4. The Redis Cache (Hidden)
  redis:
    build: ./redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # No ports exposed!

  # 5. The PostgreSQL Database (Hidden)
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: taskmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed!

volumes:
  redis_data:
  postgres_data:
