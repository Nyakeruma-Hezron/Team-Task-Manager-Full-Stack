# redis/redis.conf

# Bind to all network interfaces inside the Docker network
bind 0.0.0.0

# Set a memory limit (good practice for a VPS)
maxmemory 256mb

# When memory is full, remove the least recently used keys first
maxmemory-policy allkeys-lru

# Optional: Enable data persistence (saves cache to disk so it survives restarts)
appendonly yes